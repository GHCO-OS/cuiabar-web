name: Deploy Cloudflare (manual fallback)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-main
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  CLOUDFLARE_ACCOUNT_ID: b174b77b3f222f4b36461064267baea3

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Guard main ref
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Manual production deploys must run from main."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build site and worker
        run: npm run build:ci

      - name: Performance budget
        run: npm run perf:check

  deploy-pages:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Guard main ref
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Manual production deploys must run from main."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Performance budget
        run: npm run perf:check

      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=cuiabar-site

  deploy-worker:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Guard main ref
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Manual production deploys must run from main."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app and worker
        run: npm run build:ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
